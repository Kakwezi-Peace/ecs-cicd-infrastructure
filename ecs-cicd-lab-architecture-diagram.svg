<text class="sub-text" x="115" y="116">Application code</text>

<line x1="180" y1="106" x2="218" y2="106" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="84" width="150" height="44" rx="8" fill="#7F77DD" stroke="#534AB7" stroke-width="0.5"/>
<text class="box-text" x="295" y="100">GitHub Actions</text>
<text class="sub-text" x="295" y="116">OIDC authentication</text>

<line x1="370" y1="106" x2="408" y2="106" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="410" y="84" width="130" height="44" rx="8" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
