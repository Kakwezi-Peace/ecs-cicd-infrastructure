<text class="sub-text" x="115" y="184">Blue/green deploy</text>

<line x1="115" y1="196" x2="115" y2="214" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>

<!-- AWS Cloud Container -->
<rect x="30" y="220" width="620" height="670" rx="14" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="6 4"/>
