<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="font-family: Arial, Helvetica, sans-serif; background: #f8f9fa;">
<style>
  .title { font-size: 18px; font-weight: 600; fill: #1a1a1a; }
  .section { font-size: 14px; font-weight: 600; fill: #333; }
  .label { font-size: 12px; fill: #555; }
  .box-text { font-size: 12px; font-weight: 500; fill: #fff; text-anchor: middle; dominant-baseline: central; }
  .box-text-dark { font-size: 12px; font-weight: 500; fill: #333; text-anchor: middle; dominant-baseline: central; }
  .sub-text { font-size: 10px; fill: #fff; text-anchor: middle; dominant-baseline: central; }
  .sub-text-dark { font-size: 10px; fill: #666; text-anchor: middle; dominant-baseline: central; }
  .note { font-size: 11px; fill: #666; text-anchor: middle; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text class="title" x="340" y="30" text-anchor="middle">ECS CI/CD Lab — Network Architecture</text>
<text class="label" x="340" y="48" text-anchor="middle">Kakwezi Peace | eu-north-1 (Stockholm)</text>

<!-- CI/CD Pipeline Section -->
<text class="section" x="340" y="72" text-anchor="middle">CI/CD Pipeline</text>

<!-- Build Row -->
<rect x="50" y="84" width="130" height="44" rx="8" fill="#444" stroke="#333" stroke-width="0.5"/>
