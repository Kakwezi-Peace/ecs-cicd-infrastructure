<line x1="200" y1="566" x2="200" y2="700" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="480" y1="566" x2="480" y2="700" stroke="#993C1D" stroke-width="0.5" stroke-dasharray="4 3"/>

<!-- VPC Endpoints -->
<rect x="85" y="702" width="510" height="80" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
