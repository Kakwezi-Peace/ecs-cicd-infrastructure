<text class="sub-text" x="475" y="116">Container images</text>

<!-- Deploy Row -->
<line x1="475" y1="128" x2="475" y2="150" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="410" y="152" width="130" height="44" rx="8" fill="#BA7517" stroke="#854F0B" stroke-width="0.5"/>
<text class="box-text" x="475" y="168">EventBridge</text>
<text class="sub-text" x="475" y="184">ECR push event</text>

<line x1="410" y1="174" x2="372" y2="174" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="152" width="150" height="44" rx="8" fill="#378ADD" stroke="#185FA5" stroke-width="0.5"/>
<text class="box-text" x="295" y="168">CodePipeline</text>
<text class="sub-text" x="295" y="184">Orchestration</text>

<line x1="220" y1="174" x2="182" y2="174" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="50" y="152" width="130" height="44" rx="8" fill="#1D9E75" stroke="#0F6E56" stroke-width="0.5"/>
