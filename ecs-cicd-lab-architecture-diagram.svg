<rect x="454" y="738" width="125" height="28" rx="6" fill="#D85A30" stroke="#993C1D" stroke-width="0.5"/>
<text style="font-size:10px;fill:#fff;text-anchor:middle;dominant-baseline:central" x="516" y="752">CloudWatch Logs</text>

<!-- Legend / Notes -->
<text class="note" x="340" y="810">Blue/green deployment via CodeDeploy | OIDC auth (no long-lived secrets)</text>
<text class="note" x="340" y="828">ECS tasks pull images via VPC endpoints (no internet required)</text>
<text class="note" x="340" y="846">All infrastructure provisioned via CloudFormation with GitSync</text>

