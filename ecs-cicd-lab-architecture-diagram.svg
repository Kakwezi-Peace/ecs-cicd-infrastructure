<rect x="365" y="382" width="230" height="80" rx="8" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
<text class="box-text-dark" x="480" y="400">Public subnet</text>
<text class="sub-text-dark" x="480" y="416">10.0.2.0/24</text>

